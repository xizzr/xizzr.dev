    <script>
      async function sendCommand(cmd) {
        await fetch("/server/command", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            command: cmd,
            config: { map: "de_dust2", maxplayers: 10 }
          })
        });
      }
    </script>
